name: build

# node-pty is a native module and can't be cross-compiled, so each OS builds its own installer.
# Push a v* tag to build AND publish a GitHub Release (installers + the latest*.yml update metadata
# the in-app auto-updater reads). workflow_dispatch builds artifacts only, without publishing.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write          # electron-builder creates/uploads the GitHub Release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'   # node-gyp needs distutils, removed from Python 3.12+
      # npm ci runs the postinstall electron-rebuild, so node-pty is built for this OS's Electron.
      - run: npm ci

      - name: Build + publish (macOS, unsigned ad-hoc)
        if: runner.os == 'macOS'
        run: npm run dist -- -c.mac.identity=null --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + publish (Windows / Linux)
        if: runner.os != 'macOS'
        run: npm run dist -- --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: souljaterm-${{ runner.os }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
