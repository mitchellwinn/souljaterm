<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
  <link rel="stylesheet" href="styles.css" />
  <title>Roll</title>
  <style>
    body { background: var(--screen); }
    #pop { display: flex; flex-direction: column; height: 100vh; padding: 4px; gap: 4px; }
    #pop-head { height: 22px; -webkit-app-region: drag; display: flex; align-items: center;
      justify-content: flex-end; padding-right: 4px; }
    #pop-head .btn { -webkit-app-region: no-drag; }
    #pop-face { flex: 0 0 auto; }
    #pop-feed { flex: 1; }
  </style>
</head>
<body>
  <div id="pop">
    <div id="pop-head"><button id="pop-in" class="btn" title="Dock back in">⇲</button></div>
    <div id="pop-face" class="lcd"></div>
    <div id="pop-msg" class="lcd lcd-text"></div>
  </div>
  <script src="roll-anim.js"></script>
  <script src="roll-face.js"></script>
  <script src="assistant.js"></script>
</body>
</html>
